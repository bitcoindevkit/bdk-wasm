name: Build, Lint, and Test

on:
  workflow_call:

jobs:
  build-wasm-node:
    name: Build WASM (Node target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm-node"
      - name: Build WASM (Node target)
        run: wasm-pack build --target nodejs --all-features
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-node-pkg
          path: pkg/
          retention-days: 1

  build-test:
    name: Build and test - Browser
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable
        features:
          - all
          - debug,default
          - debug,esplora
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install wasm-pack
        run: curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1 wasm-pack-v0.14.0-x86_64-unknown-linux-musl/wasm-pack
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: |
          if [ "${{ matrix.features }}" = "all" ]; then
            wasm-pack build --all-features
          else
            wasm-pack build --features ${{ matrix.features }}
          fi
      - name: Test
        if: ${{ matrix.features != 'all' }}
        run: wasm-pack test --chrome --firefox --headless --features ${{ matrix.features }}

  build-lint-test-node:
    name: Build, Lint and test - Node
    runs-on: ubuntu-latest
    needs: build-wasm-node
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: tests/node/yarn.lock
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-node-pkg
          path: pkg/
      - name: Install
        working-directory: tests/node
        run: yarn install --immutable
      - name: Lint
        working-directory: tests/node
        run: yarn lint
      - name: Test
        working-directory: tests/node
        run: yarn jest --testPathIgnorePatterns='integration/(esplora|events)'

  esplora-integration:
    name: Esplora integration tests
    runs-on: ubuntu-latest
    needs: build-wasm-node
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: tests/node/yarn.lock
      - name: Install dependencies
        working-directory: tests/node
        run: yarn install --immutable
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-node-pkg
          path: pkg/
      - name: Cache Esplora Docker image
        id: cache-esplora
        uses: actions/cache@v4
        with:
          path: /tmp/esplora-image.tar
          key: esplora-docker-${{ hashFiles('tests/docker-compose.yml') }}
      - name: Load Esplora image from cache
        if: steps.cache-esplora.outputs.cache-hit == 'true'
        run: docker load -i /tmp/esplora-image.tar
      - name: Pull and save Esplora image
        if: steps.cache-esplora.outputs.cache-hit != 'true'
        run: |
          docker pull blockstream/esplora
          docker save blockstream/esplora -o /tmp/esplora-image.tar
      - name: Start Esplora regtest
        run: docker compose -f tests/docker-compose.yml up -d
      - name: Wait for Esplora
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8094/regtest/api/blocks/tip/height > /dev/null 2>&1; then
              echo "Esplora is ready"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 3
          done
          echo "Esplora did not start in time"
          docker compose -f tests/docker-compose.yml logs
          exit 1
      - name: Fund test wallet
        run: docker exec esplora-regtest bash /init-esplora.sh
      - name: Wait for Esplora indexing
        run: sleep 10
      - name: Run Esplora integration tests
        working-directory: tests/node
        run: NETWORK=regtest ESPLORA_URL=http://localhost:8094/regtest/api yarn jest --runInBand --testPathPatterns='integration/(esplora|events)'
      - name: Stop Esplora
        if: always()
        run: docker compose -f tests/docker-compose.yml down

  signet-smoke-test:
    name: Signet smoke test (main only)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-wasm-node
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: tests/node/yarn.lock
      - name: Install dependencies
        working-directory: tests/node
        run: yarn install --immutable
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-node-pkg
          path: pkg/
      - name: Run Mutinynet signet tests
        working-directory: tests/node
        run: yarn jest --testPathPatterns='integration/esplora'

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --config format_code_in_doc_comments=true --check
      - name: Run Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings